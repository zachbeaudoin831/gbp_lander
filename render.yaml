services:
  - type: web
    name: gbp-lander-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false